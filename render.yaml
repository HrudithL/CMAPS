# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo in Render dashboard → New → Blueprint → select this file.
services:
  - type: web
    name: cmaps-api
    runtime: docker
    dockerfilePath: api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health    
    envVars:
      - key: CORS_ORIGINS
        sync: false
